name: Teste and Deploy

on:
  push:
    branches: [grupo20/calc_consumo_agua]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.changes.outputs.api }}
      app: ${{ steps.changes.outputs.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            api:
              - 'api/**'
            app:
              - 'app/**'

  unitTestApi:
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Get Code from repository
        uses: actions/checkout@v4

      - name: Instala o Node na maquina virtual
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instala as dependencias do projeto
        working-directory: api
        run: npm ci

      - name: Roda os testes
        working-directory: api
        run: npm run test

      - name: Gera relatorio de testes
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: JEST tests
          path: ./api/j*.xml
          reporter: jest-junit

      - name: Sobe a API em background
        working-directory: api
        run: npm run start &
        env:
          PORT: 3001
          NODE_ENV: test

      - name: Instala as dependencias do app
        working-directory: app
        run: npm ci

      - name: Sobe o app em background
        working-directory: app
        run: npm run start &
        env:
          PORT: 3000
          API_URL: http://localhost:3001

      - name: Aguardar servicos ficarem prontos
        run: npx wait-on http://localhost:3001/health http://localhost:3000 --timeout 30000

      - name: Instala as dependencias do e2e
        working-directory: e2e-tests
        run: npm ci

      - name: Roda os testes funcionais
        if: success()
        working-directory: e2e-tests
        run: npm run test
        env:
          API_URL: http://localhost:3001
          APP_URL: http://localhost:3000

      - name: Verifica arquivos gerados
        working-directory: e2e-tests
        run: ls -la

      - name: Salva screenshots dos testes
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: Fotos dos testes
          path: /home/runner/work/GCEIC26/GCEIC26/e2e-tests/screenshots/*.png

  deploy-api:
    needs: unitTestApi
    if: success()
    runs-on: ubuntu-latest
    outputs:
      dep_api: ${{ steps.set-output-api.outputs.dep_api }}
    steps:
      - name: Deploy_Project_API
        id: Deploy_Project_API
        run: |
          RESPONSE=$(curl --request GET \
               --url ${{ secrets.DEPLOY_HOOK }} \
               --header 'accept: application/json' \
               --header 'content-type: application/json')
          echo "Deploy response: $RESPONSE"
          DEPLOY_ID=$(echo $RESPONSE | jq -r '.deploy.id')
          echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT
          echo "Deploy ID: $DEPLOY_ID"

      - name: Wait for deploy to complete
        run: |
          MAX_ATTEMPTS=30
          ATTEMPT=0
          echo "Aguardando deploy finalizar..."
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            STATUS=$(curl --request GET \
              --url https://api.render.com/v1/services/${{ secrets.SERVICE_ID }}/deploys/${{ steps.Deploy_Project_API.outputs.deploy_id }} \
              --header "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              | jq -r '.status')
            echo "Tentativa $((ATTEMPT + 1)) — Status: $STATUS"
            if [ "$STATUS" = "live" ] || [ "$STATUS" = "null" ]; then
              echo "✅ Deploy concluído com sucesso!"
              exit 0
            elif [ "$STATUS" = "build_failed" ] || [ "$STATUS" = "deactivated" ] || [ "$STATUS" = "canceled" ]; then
              echo "❌ Deploy falhou com status: $STATUS"
              exit 1
            fi
            ATTEMPT=$((ATTEMPT + 1))
            sleep 20
          done
          echo "⏱️ Timeout: deploy não finalizou em 10 minutos"
          exit 1

      - name: Notify success
        if: success()
        id: set-output-api
        run: |
          echo "dep_api=true" >> $GITHUB_OUTPUT
          echo "🚀 Deploy da API concluído com sucesso!"

      - name: Notify failure
        if: failure()
        run: |
          echo "dep_api=false" >> $GITHUB_OUTPUT
          echo "💥 Pipeline falhou. Verifique os logs acima."

  deploy-app:
    needs: detect-changes
    if: needs.detect-changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    outputs:
      dep_app: ${{ steps.set-output-app.outputs.dep_app }}
    steps:
      - name: Deploy_Project_APP
        id: Deploy_Project_APP
        run: |
          RESPONSE=$(curl --request GET \
               --url ${{ secrets.DEPLOY_APP_HOOK }} \
               --header 'accept: application/json' \
               --header 'content-type: application/json')
          echo "Deploy response: $RESPONSE"
          DEPLOY_ID=$(echo $RESPONSE | jq -r '.deploy.id')
          echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT
          echo "Deploy ID: $DEPLOY_ID"

      - name: Wait for deploy to complete
        run: |
          MAX_ATTEMPTS=30
          ATTEMPT=0
          echo "Aguardando deploy do app finalizar..."
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            STATUS=$(curl --request GET \
              --url https://api.render.com/v1/services/${{ secrets.SERVICE_ID_APP }}/deploys/${{ steps.Deploy_Project_APP.outputs.deploy_id }} \
              --header "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              | jq -r '.status')
            echo "Tentativa $((ATTEMPT + 1)) — Status: $STATUS"
            if [ "$STATUS" = "live" ] || [ "$STATUS" = "null" ]; then
              echo "✅ Deploy do app concluído com sucesso!"
              exit 0
            elif [ "$STATUS" = "build_failed" ] || [ "$STATUS" = "deactivated" ] || [ "$STATUS" = "canceled" ]; then
              echo "❌ Deploy falhou com status: $STATUS"
              exit 1
            fi
            ATTEMPT=$((ATTEMPT + 1))
            sleep 20
          done
          echo "⏱️ Timeout: deploy não finalizou em 10 minutos"
          exit 1

      - name: Notify success
        if: success()
        id: set-output-app
        run: |
          echo "dep_app=true" >> $GITHUB_OUTPUT
          echo "🚀 Deploy do app concluído com sucesso!"

      - name: Notify failure
        if: failure()
        run: |
          echo "dep_app=false" >> $GITHUB_OUTPUT
          echo "💥 Pipeline falhou. Verifique os logs acima."

  teste-funcional-render:
    needs: [deploy-api, deploy-app]
    if: needs.deploy-api.outputs.dep_api == 'true' && needs.deploy-app.outputs.dep_app == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Get Code from repository
        uses: actions/checkout@v4

      - name: Instala o Node na maquina virtual
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instala as dependencias do e2e
        working-directory: e2e-tests
        run: npm ci

      - name: Roda os testes funcionais no Render
        if: success()
        working-directory: e2e-tests
        run: npm run test
        env:
          API_URL: ${{ secrets.RENDER_API_URL }}
          APP_URL: ${{ secrets.RENDER_APP_URL }}

      - name: Verifica arquivos gerados
        working-directory: e2e-tests
        run: ls -la

      - name: Salva screenshots dos testes no Render
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: Fotos dos testes Render
          path: /home/runner/work/GCEIC26/GCEIC26/e2e-tests/screenshots/*.png