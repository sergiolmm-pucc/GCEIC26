name: Teste and Deploy

on:
  push:
    branches: ["**"]

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        type: choice
        required: true
        default: 'dev'
        options:
          - dev
          - stage
          - prod  
  
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.changes.outputs.api }}
      app: ${{ steps.changes.outputs.app }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            api:
              - 'api/**'
            app:
              - 'app/**'
              - 'e2e-tests/**'
              - '.github/workflows/deploy.yml'

  unitTestApi:
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Get Code from repository
        uses: actions/checkout@v6
      - name: verifica se fez corretamente
        run: ls -la
      - name: Instala o Node na maquina virtual
        uses: actions/setup-node@v6
      - name: Instala as dependencias do projeto
        working-directory: api
        run: npm ci
      - name: Roda os testes
        working-directory: api
        run: npm run test
      - name: verifica se fez corretamente
        working-directory: api
        run: ls -la
      - name: Gera relatorio de testes
        uses: dorny/test-reporter@v3
        if: success() || failure() # roda de qualquer maneira
        with:
          name: JEST tests
          path: ./api/j*.xml
          reporter: jest-junit

      - name: Subir a API em background
        working-directory: api
        run: npm run start &
        env:
          PORT: 3001
          NODE_ENV: test
      - name: Instala as dependencias do projeto
        working-directory: app
        run: npm ci

      - name: Subir o site em background
        working-directory: app
        run: npm run start &
        env:
          PORT: 3000

      - name: Aguardar serviços ficarem prontos
        run: npx wait-on http://localhost:3001/health http://localhost:3000 --timeout 120000

      - name: Instala as dependencias do projeto
        working-directory: e2e-tests
        run: npm ci
      - name: Instalar Chrome e ChromeDriver compatíveis
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 149 # G
      - name: Roda os testes Funcionais
        if: success()
        working-directory: e2e-tests
        run: npm run test
        env:
          API_URL: http://localhost:3001
          APP_URL: http://localhost:3000

      - name: verifica se fez corretamente
        working-directory: e2e-tests
        run: ls -la
      - name: fotos da tela
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Fotos dos testes
          # Path to the release files
          # Gravar as fotos na raiz do projeto no docker
          path: /home/runner/work//GCEIC26/GCEIC26/e2e-tests/screenshots/*.png

  deploy-api:
    needs: unitTestApi
    if: success() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      dep_api: ${{ steps.set-output-api.outputs.dep_api }}
    steps:
      - name: Deploy_Project_API
        id: Deploy_Project_API
        run: |
          RESPONSE=$(curl --request GET \
               --url ${{ secrets.DEPLOY_HOOK }} \
               --header 'accept: application/json' \
               --header 'content-type: application/json') 

          echo "Deploy response: $RESPONSE"

          DEPLOY_ID=$(echo $RESPONSE | jq -r '.deploy.id')
          echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT
          echo "Deploy ID: $DEPLOY_ID"

      - name: Wait for deploy to complete
        run: |
          DEPLOY_ID="${{ steps.Deploy_Project_API.outputs.deploy_id }}"
          SERVICE_ID="${{ secrets.SERVICE_ID }}"
          MAX_ATTEMPTS=30   # 30 x 20s = 10 minutos
          ATTEMPT=0

          echo "Aguardando deploy $DEPLOY_ID finalizar..."

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            STATUS=$(curl --request GET \
              --url https://api.render.com/v1/services/${{ secrets.SERVICE_ID }}/deploys/${{ steps.Deploy_Project_API.outputs.deploy_id }} \
              --header "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              | jq -r '.status')

            echo "Tentativa $((ATTEMPT + 1)) — Status: $STATUS"

            if [ "$STATUS" = "live" ] || [ "$STATUS" = "null" ]; then
              echo "✅ Deploy concluído com sucesso!"
              exit 0
            elif [ "$STATUS" = "build_failed" ] || [ "$STATUS" = "deactivated" ] || [ "$STATUS" = "canceled" ]; then
              echo "❌ Deploy falhou com status: $STATUS"
              exit 1
            fi

            ATTEMPT=$((ATTEMPT + 1))
            sleep 20
          done

          echo "⏱️ Timeout: deploy não finalizou em 10 minutos"
          exit 1

      - name: Notify success
        if: success()
        id: set-output-api
        run: |
          echo "dep_api=true" >> $GITHUB_OUTPUT
          echo "🚀 Deploy e health check concluídos com sucesso!"

      - name: Notify failure
        if: failure()
        run: |
          echo "dep_api=false" >> $GITHUB_OUTPUT
          echo "💥 Pipeline falhou. Verifique os logs acima."


  testa-app:
    needs: detect-changes
    if: needs.detect-changes.outputs.app == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Get Code from repository
