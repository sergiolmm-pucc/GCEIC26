name: Teste and Deploy

on:
  push:
    branches: [main, dev, "grupo1/calculo_finv"]
  pull_request:
    branches: [grupo1/calculo_finv]
  
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.changes.outputs.api }}
      app: ${{ steps.changes.outputs.app }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            api:
              - 'api/**'
            app:
              - 'app/**'
              
  unitTestApi:
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Get Code from repository
        uses: actions/checkout@v6
      - name: verifica se fez corretamente
        run:  ls -la
      - name: Instala o Node na maquina virtual        
        uses: actions/setup-node@v6
      - name: Instala as dependencias do projeto
        working-directory: api 
        run: npm ci
      - name: Roda os testes
        working-directory: api 
        run: npm run test 
      - name: verifica se fez corretamente
        working-directory: api 
        run:  ls -la        
      - name: Gera relatorio de testes
        uses: dorny/test-reporter@v3
        if: success() || failure()  # roda de qualquer maneira
        with:
          name: JEST tests
          path: ./api/j*.xml
          reporter: jest-junit

  deploy-api:
    needs: unitTestApi
    if: success()    
    runs-on: ubuntu-latest
    steps:
      - name: Deploy_Project_API
        id: Deploy_Project_API
        run: |
          RESPONSE=$(curl --request GET \
               --url ${{ secrets.DEPLOY_HOOK }} \
               --header 'accept: application/json' \
               --header 'content-type: application/json') 

          echo "Deploy response: $RESPONSE"

          DEPLOY_ID=$(echo $RESPONSE | jq -r '.deploy.id')
          echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT
          echo "Deploy ID: $DEPLOY_ID"
        
      - name: Wait for deploy to complete
        run: |
          DEPLOY_ID="${{ steps.Deploy_Project_API.outputs.deploy_id }}"
          SERVICE_ID="${{ secrets.SERVICE_ID }}"
          MAX_ATTEMPTS=30   # 30 x 20s = 10 minutos
          ATTEMPT=0

          echo "Aguardando deploy $DEPLOY_ID finalizar..."

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            STATUS=$(curl --request GET \
              --url https://api.render.com/v1/services/${{ secrets.SERVICE_ID }}/deploys/${{ steps.Deploy_Project_API.outputs.deploy_id }} \
              --header "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              | jq -r '.status')

            echo "Tentativa $((ATTEMPT + 1)) — Status: $STATUS"

            if [ "$STATUS" = "live" ]; then
              echo "✅ Deploy concluído com sucesso!"
              exit 0
            elif [ "$STATUS" = "build_failed" ] || [ "$STATUS" = "deactivated" ] || [ "$STATUS" = "canceled" ]; then
              echo "❌ Deploy falhou com status: $STATUS"
              exit 1
            fi

            ATTEMPT=$((ATTEMPT + 1))
            sleep 20
          done

          echo "⏱️ Timeout: deploy não finalizou em 10 minutos"
          exit 1          


      - name: Notify success
        if: success()
        run: echo "🚀 Deploy e health check concluídos com sucesso!"

      - name: Notify failure
        if: failure()
        run: echo "💥 Pipeline falhou. Verifique os logs acima."            

        
  unitTestApp:
    needs: detect-changes
    if: needs.detect-changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Deploy_Project_APP
        id: Deploy_Project_APP
        run: |
          RESPONSE=$(curl --request GET \
               --url ${{ secrets.DEPLOY_APP_HOOK }} \
               --header 'accept: application/json' \
               --header 'content-type: application/json') 
  
          echo "Deploy response: $RESPONSE"


  e2eTests:
    runs-on: ubuntu-latest
    needs: detect-changes

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v6

      - name: Instala o Node
        uses: actions/setup-node@v6

      - name: Instala dependências da API
        working-directory: api
        run: npm ci

      - name: Inicia a API em background
        working-directory: api
        run: npm start &

      - name: Instala dependências do App
        working-directory: app
        run: npm ci

      - name: Build do App
        working-directory: app
        run: CI=false npm run build

      - name: Serve o App em background
        run: npx serve -s app/build -p 3000 &

      - name: Instala dependências E2E
        working-directory: e2e-tests
        run: npm ci

      - name: Aguarda API e App estarem prontos
        run: npx wait-on http://localhost:3001/health http://localhost:3000 --timeout 60000

      - name: Roda testes E2E — Simulação
        working-directory: e2e-tests
        run: npm run test:simulacao

      - name: Roda testes E2E — Capacidade
        working-directory: e2e-tests
        run: npm run test:capacidade
