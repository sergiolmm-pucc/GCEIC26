name: Teste and Deploy

on:
  push:
    branches:
      - grupo14/PBL
  pull_request:
    branches:
      - grupo14/PBL
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detectar alteracoes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.changes.outputs.api }}
      app: ${{ steps.changes.outputs.app }}
      e2e: ${{ steps.changes.outputs.e2e }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filtrar alteracoes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'api/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/**'
            app:
              - 'app/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/**'
            e2e:
              - 'api/**'
              - 'app/**'
              - 'e2e-tests/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/**'

  test-api:
    name: Testes da API
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Instalar dependencias
        working-directory: api
        run: npm ci

      - name: Rodar testes
        working-directory: api
        run: npm test

      - name: Publicar relatorio dos testes
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Testes da API
          path: api/junit.xml
          reporter: java-junit
          fail-on-error: false

  test-app:
    name: Testes e build do frontend
    needs: detect-changes
    if: needs.detect-changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Instalar dependencias
        working-directory: app
        run: npm ci

      - name: Rodar testes
        working-directory: app
        run: npm test

      - name: Gerar build
        working-directory: app
        run: npm run build

      - name: Armazenar build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: app/dist

  test-e2e:
    name: Testes E2E
    needs:
      - detect-changes
      - test-api
      - test-app
    if: >-
      always() &&
      needs.detect-changes.outputs.e2e == 'true' &&
      (needs.test-api.result == 'success' || needs.test-api.result == 'skipped') &&
      (needs.test-app.result == 'success' || needs.test-app.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            api/package-lock.json
            app/package-lock.json
            e2e-tests/package-lock.json

      - name: Instalar dependencias
        run: |
          npm ci --prefix api
          npm ci --prefix app
          npm ci --prefix e2e-tests

      - name: Iniciar API e frontend
        run: |
          npm start --prefix api > api.log 2>&1 &
          npm run dev --prefix app -- --host 127.0.0.1 > app.log 2>&1 &
          curl --retry 15 --retry-delay 1 --retry-connrefused --fail http://127.0.0.1:3001/
          curl --retry 15 --retry-delay 1 --retry-connrefused --fail http://127.0.0.1:5173/

      - name: Rodar testes Selenium
        working-directory: e2e-tests
        env:
          APP_URL: http://127.0.0.1:5173
        run: npm test

      - name: Armazenar evidencias E2E
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-evidencias
          path: |
            e2e-tests/screenshots
            api.log
            app.log
          if-no-files-found: ignore

  deploy-api:
    name: Deploy da API
    needs:
      - detect-changes
      - test-api
      - test-e2e
    if: >-
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/grupo14/PBL' &&
      needs.detect-changes.outputs.api == 'true' &&
      needs.test-api.result == 'success' &&
      (needs.test-e2e.result == 'success' || needs.test-e2e.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOOK: ${{ secrets.DEPLOY_HOOK }}
    steps:
      - name: Acionar deploy da API
        if: env.DEPLOY_HOOK != ''
        run: curl --fail-with-body --request GET "$DEPLOY_HOOK"

      - name: Avisar quando hook nao estiver configurado
        if: env.DEPLOY_HOOK == ''
        run: echo "::notice::DEPLOY_HOOK nao configurado; deploy da API ignorado."

  deploy-app:
    name: Deploy do frontend
    needs:
      - detect-changes
      - test-app
      - test-e2e
    if: >-
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/grupo14/PBL' &&
      needs.detect-changes.outputs.app == 'true' &&
      needs.test-app.result == 'success' &&
      (needs.test-e2e.result == 'success' || needs.test-e2e.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      DEPLOY_APP_HOOK: ${{ secrets.DEPLOY_APP_HOOK }}
    steps:
      - name: Acionar deploy do frontend
        if: env.DEPLOY_APP_HOOK != ''
        run: curl --fail-with-body --request GET "$DEPLOY_APP_HOOK"

      - name: Avisar quando hook nao estiver configurado
        if: env.DEPLOY_APP_HOOK == ''
        run: echo "::notice::DEPLOY_APP_HOOK nao configurado; deploy do frontend ignorado."
