name: Teste Automatizado (CI)

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.changes.outputs.api }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            api:
              - 'api/**'
              
  unitTestApi:
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Get Code from repository
        uses: actions/checkout@v4
      
      - name: verifica se fez corretamente
        run: ls -la
        
      - name: Instala o Node na maquina virtual        
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Instala as dependencias do projeto
        working-directory: api 
        run: npm ci
        
      - name: Roda os testes
        working-directory: api 
        run: npm run test 
        
      - name: verifica se fez corretamente
        working-directory: api 
        run: ls -la        
