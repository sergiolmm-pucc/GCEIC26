name: Node.js CI - Grupo 11

on:
  push:
    branches: [ "autonomia-carros" ]
  pull_request:
    branches: [ "autonomia-carros" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'

    # 1. Testar a API (Testes Unitários)
    - name: Instalar dependências e Rodar Testes (API)
      run: |
        cd api
        npm install
        npm test

    # 2. Iniciar a API em segundo plano (na porta 3001)
    - name: Iniciar a API em Background
      run: |
        cd api
        npm start &

    # 3. Instalar e Iniciar o Frontend em segundo plano (na porta 3000)
    - name: Instalar dependências e Iniciar App (Frontend)
      run: |
        cd app
        npm install
        npm start &
      env:
        CI: false
        BROWSER: none

    # 4. Instalar dependências E2E
    - name: Instalar dependências E2E
      run: |
        cd e2e-tests
        npm install

    # 5. Rodar os Testes Funcionais (E2E) com Cypress
    - name: Rodar Testes Funcionais (Cypress)
      uses: cypress-io/github-action@v6
      with:
        working-directory: ./e2e-tests
        install: false
        wait-on: 'http://localhost:3000'
        wait-on-timeout: 120
